[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "grc-agent"
version = "0.1.0"
description = "Local GNU Radio Companion .grc assistant."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "graphifyy==0.4.11",
    "networkx>=3.6.1",
    "pyyaml>=6.0.3",
]

[dependency-groups]
dev = [
    "ruff>=0.15.9",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
extend-exclude = ["Temp", "random_bit_generator.py"]
