[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "grc-agent"
version = "0.1.0"
description = "Local GNU Radio Companion .grc assistant."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "ToolAgents==0.3.0",
    # GNU Radio 3.10.x Python bindings in the supported local environment are
    # built against the NumPy 1.x ABI. Remove this when the supported GNU Radio
    # target and deterministic gates pass with NumPy 2.x.
    "numpy<2 ; python_full_version < '3.13'",
    "pyyaml>=6.0.3",
    # Provides local Qdrant + FastEmbed integration. Embedding model files are
    # downloaded/cached by the user's environment during explicit vector build;
    # they are not bundled in this package.
    "qdrant-client[fastembed]>=1.14.2",
    "PySide6>=6.5.0",
    "Pygments>=2.17.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15.9",
    "ruamel-yaml>=0.19.1",
    "pytest>=8.0.0",
    "pytest-qt>=4.4.0",
]

[project.scripts]
grc-agent = "grc_agent.cli:main"
grc-agent-gui = "grc_agent_gui.app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
extend-exclude = ["Temp"]
