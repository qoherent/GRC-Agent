[llama]
server_url = "http://localhost:11434"
backend = "ollama"
# Custom Modelfile model: maxwell1500/ornith-9b:q4_K_M with PARAMETER num_ctx
# 120000. Ollama's OpenAI-compatible /v1 endpoint does NOT honor per-request
# num_ctx, so the 120K window is baked into the model (see
# docs/AGENT_FLOW_FINDINGS.md). ornith-9b is a thinking model; the provider
# sends think:false by default (enable_thinking=False) so it answers in content.
model = "maxwell1500/ornith-9b:q4_K_M-120k"
embedding_model = "embeddinggemma:latest"
max_tokens = 4096
max_tool_rounds = 8
temperature = 0.0
enable_thinking = false
request_timeout_seconds = 120.0

[agent]
history_compact_budget = 100000
max_tool_result_chars = 4000

[agent.retrieval]
search_blocks_default_k = 10
search_blocks_max_k = 12
ask_grc_docs_default_k = 3
ask_grc_docs_max_k = 6

[agent.history]
checkpoint_retention = 100

[agent.guardrails]
max_tool_output_bytes = 32768
max_validation_errors = 8
max_validation_stderr_chars = 1200
max_compact_list_items = 3
max_context_nodes = 20
