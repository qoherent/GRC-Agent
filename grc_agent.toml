[llama]
server_url = "http://localhost:11434"
backend = "ollama"
# Custom Modelfile model: gemma4:e4b-it-qat with PARAMETER num_ctx 120000.
# Ollama's /v1 endpoint ignores per-request num_ctx, so the 120K window is
# baked into the model (see docs/AGENT_FLOW_FINDINGS.md).
model = "gemma4:e4b-it-qat-120k"
embedding_model = "embeddinggemma:latest"
max_tokens = 4096
max_tool_rounds = 8
request_timeout_seconds = 120.0

[agent]
history_compact_budget = 100000
max_tool_result_chars = 4000

[agent.retrieval]
search_blocks_default_k = 5
ask_grc_docs_default_k = 5

[agent.history]
checkpoint_retention = 100

[agent.guardrails]
max_tool_output_bytes = 32768
max_compact_list_items = 3
