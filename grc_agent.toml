[llama]
server_url = "http://localhost:11434"
backend = "ollama"
# Chat and embedding model names live in .env (OLLAMA_MODEL,
# OLLAMA_EMBEDDING_MODEL, OPENROUTER_MODEL, OPENROUTER_EMBEDDING_MODEL) —
# .env is the single source of truth, edited via the GUI or by hand.
# Example: a custom Ollama Modelfile model gemma4:e4b-it-qat with
# PARAMETER num_ctx 120000 (Ollama's /v1 endpoint ignores per-request
# num_ctx, so a large context window must be baked into the Modelfile).
request_timeout_seconds = 120.0

[agent.retrieval]
search_blocks_default_k = 5
ask_grc_docs_default_k = 5

[agent.history]
checkpoint_retention = 100
