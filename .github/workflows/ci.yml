name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Run Ruff (lint)
        run: uv run ruff check

      - name: Run Ruff (format check)
        run: uv run ruff format --check

      - name: Install GNU Radio
        run: |
          sudo apt-get update
          sudo apt-get install -y gnuradio

      # Runs the full unit and web app test suite. LLM/vector-dependent tests
      # will automatically skip if no local Ollama or OpenRouter credentials are found.
      - name: Run tests
        run: uv run pytest tests/test_unit.py tests/test_web_app.py -v
