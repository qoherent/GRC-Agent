name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev --locked

      - name: Run Ruff (lint)
        run: uv run ruff check

      - name: Run Ruff (format check)
        run: uv run ruff format --check

      - name: Install GNU Radio
        run: |
          sudo apt-get update
          sudo apt-get install -y gnuradio

      # Runs the fast, no-live-model test suites (matches AGENTS.md's Test
      # Gate). LLM/vector-dependent tests inside these suites automatically
      # skip if no local Ollama or OpenRouter credentials are found.
      # test_button_integration.py (Ollama Cloud) and test_integration.py
      # (live model, ~15-20 min) are not run here.
      - name: Run tests
        run: uv run pytest tests/test_unit.py tests/test_exec_monitor.py tests/test_isolation.py -v
