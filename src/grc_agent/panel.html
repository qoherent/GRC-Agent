<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qoherent GRC Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0b0f14;
    --surface: #141a21;
    --surface-2: #1c232c;
    --border: #262f39;
    --text: #e4e7ea;
    --text-dim: #8b96a3;
    --accent: #e0a63a;
    --accent-dim: #7a5a26;
    --ok: #3ddc84;
    --ok-bg: #123420;
    --danger: #ff6b6b;
    --danger-bg: #3a1418;
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    --sans: 'Inter', -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* Custom scrollbars */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
  }

  /* Global micro-transitions for buttons/inputs/controls */
  button, input, select, .browse-entry, .chat-tool, #resize-handle, #model-name-label {
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.15s ease, opacity 0.15s ease;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
  }
  a { color: var(--accent); }
  button:focus-visible, input:focus-visible, a:focus-visible,
  select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  /* ---- Center panel: GRC Broadway interactive canvas ---- */
  #grc-pane {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  #canvas-container {
    flex: 1;
    min-height: 0;
    width: 100%;
    border: 0;
    position: relative;
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }
  #canvas-iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: none;
    background: #fff;
  }
  #canvas-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 30px;
    z-index: 5;
    background-image: radial-gradient(var(--border) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: center;
  }
  .placeholder-glow-container {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .placeholder-glow {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(224, 166, 58, 0.15) 0%, rgba(224, 166, 58, 0) 70%);
    animation: placeholderPulse 3s infinite ease-in-out;
  }
  @keyframes placeholderPulse {
    0%, 100% { transform: scale(0.95); opacity: 0.5; }
    50% { transform: scale(1.15); opacity: 1; }
  }
  .placeholder-icon {
    position: relative;
    color: var(--accent);
    filter: drop-shadow(0 0 8px rgba(224, 166, 58, 0.25));
    transition: transform 0.3s ease;
  }
  #canvas-placeholder:hover .placeholder-icon {
    transform: scale(1.08);
  }
  .placeholder-title {
    font-family: var(--sans);
    font-size: 16px;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  #canvas-placeholder-text {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    max-width: 380px;
    margin-bottom: 22px;
  }
  #browse-btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    background: linear-gradient(135deg, var(--accent) 0%, #c4902d 100%);
    border: 1px solid var(--accent);
    color: #0b0f14;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(224, 166, 58, 0.2);
  }
  #browse-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, #f0b548 0%, var(--accent) 100%);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(224, 166, 58, 0.3);
  }
  #browse-btn:active:not(:disabled) {
    transform: translateY(0);
  }
  #browse-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: var(--surface-2);
    border-color: var(--border);
    color: var(--text-dim);
    box-shadow: none;
  }

  #file-block {
    flex: 0 0 auto;
    padding: 14px 16px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #undo-btn, #redo-btn { padding: 7px 9px; }
  #current-path {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    word-break: break-all;
    min-width: 0;
    margin-left: 8px;
    padding-left: 12px;
    border-left: 1px solid var(--border);
  }
  #current-path .value { color: var(--text); }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 9px;
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .pill.valid { background: var(--ok-bg); color: var(--ok); }
  .pill.invalid { background: var(--danger-bg); color: var(--danger); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent-dim); }
  button svg { flex: 0 0 auto; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button:disabled:hover { border-color: var(--border); }

  #msg {
    flex: 0 0 auto;
    font-family: var(--mono);
    font-size: 11px;
    padding: 0 16px;
    height: 0;
    overflow: hidden;
    transition: height 120ms ease;
  }
  #msg.visible { height: 28px; padding-top: 6px; }
  #msg.error { color: var(--danger); }
  #msg.ok { color: var(--ok); }
  #msg.info { color: var(--accent); }

  /* ---- Chat toolbar: provider/model picker + health badge + session
     controls, as a native always-visible bar at the top of the chat pane
     (no longer an overlay positioned over an iframe combobox). ---- */
  #chat-toolbar {
    flex: 0 0 auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    min-height: 44px;
  }
  #chat-toolbar select,
  #chat-toolbar input {
    height: 32px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 12px;
    padding: 4px 8px;
  }
  #chat-toolbar select { flex: 0 0 auto; max-width: 120px; }
  #chat-toolbar input { flex: 1 1 auto; min-width: 120px; }
  .chat-toolbar-spacer { flex: 1 1 auto; }
  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toolbar-label {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    user-select: none;
    margin-left: 2px;
  }
  /* The model NAME is read-only text (#model-name-label) until clicked —
      swapping in an always-editable input risked an accidental keystroke/blur
      silently saving a change the user didn't mean to make. Clicking swaps in
      #model-name-input plus explicit confirm/cancel; nothing saves until
      confirm (or Enter) — see panel.js. */
  #chat-toolbar #clear-history-btn,
  #chat-toolbar #new-conversation-btn,
  #chat-toolbar #reset-conversation-btn {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
  }
  #chat-toolbar #clear-history-btn { color: var(--danger); }
  #chat-toolbar #clear-history-btn:hover { color: var(--danger); border-color: var(--danger); }
  #chat-toolbar #new-conversation-btn:hover,
  #chat-toolbar #reset-conversation-btn:hover { color: var(--accent); border-color: var(--accent); }
  #model-name-label {
    flex: 1 1 auto;
    min-width: 130px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #model-name-label:hover { background: var(--surface-2); border-color: var(--border); }
  #model-name-confirm-btn, #model-name-cancel-btn {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    padding: 0;
  }
  #model-name-confirm-btn { color: var(--ok); border-color: var(--ok); }
  #model-name-confirm-btn:hover { background: var(--ok-bg); }
  #model-name-cancel-btn:hover { border-color: var(--danger); color: var(--danger); }
  #chat-toolbar.error #model-name-input { border-color: var(--danger); }
  /* Persistent (no timeout) — unlike the transient .saved/.error flash,
     this stays up as long as the running Agent's active model differs from
     what's saved to disk, since a saved change never takes effect without
     an app restart (see AGENTS.md). updateRestartBadge re-derives this
     from /grc/settings' active_provider/active_model vs provider/model on
     every poll, so it's correct even right after a page reload — not a
     one-shot flag that only shows up immediately after clicking confirm. */
  #model-restart-badge {
    display: none;
    flex: 0 0 auto;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 100px;
    background: var(--accent-dim);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
    cursor: help;
  }
  #model-restart-badge.visible { display: inline-flex; }

  /* ---- Provider health indicator ---- */
  #provider-health {
    flex: 0 0 auto;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    cursor: help;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.4);
  }
  #provider-health.healthy { background: var(--ok); }
  #provider-health.unhealthy { background: var(--danger); }
  #provider-health.checking { background: var(--text-dim); }

  /* ---- API key button ---- */
  #apikey-btn {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 6px;
    color: var(--text-dim);
  }
  #apikey-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  /* ---- API key dialog ---- */
  #apikey-dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4, 6, 9, .6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.2s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.2s;
  }
  #apikey-dialog-overlay.open {
    opacity: 1;
    pointer-events: auto;
    visibility: visible;
  }
  #apikey-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 400px;
    max-width: 90vw;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    transform: scale(0.95) translateY(10px);
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #apikey-dialog-overlay.open #apikey-dialog {
    transform: scale(1) translateY(0);
  }
  #apikey-dialog-header {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  #apikey-dialog-desc {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  #apikey-dialog-desc span { color: var(--accent); font-weight: 600; }
  #apikey-input {
    width: 100%;
    height: 36px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    padding: 4px 10px;
    margin-bottom: 16px;
  }
  #apikey-dialog-footer { display: flex; justify-content: flex-end; gap: 8px; }
  #apikey-save-btn { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  #apikey-save-btn:hover { background: var(--accent); color: var(--bg); }

  /* ---- Session history list, shown above the chat input until a
      conversation is active ---- */
  #session-history-panel {
    position: absolute;
    left: 0;
    right: 0;
    display: none;
    max-height: 45%;
    overflow-y: auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 6;
  }
  #session-history-header {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 8px 16px 4px;
  }
  .session-history-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    border-top: 1px solid var(--border);
  }
  .session-history-entry:hover { background: var(--surface-2); }
  .she-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .she-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    flex: 0 0 auto;
  }

  /* ---- Credit ---- */
  #credit {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    padding: 10px 16px;
    border-top: 1px solid var(--border);
  }
  #credit a { display: inline-flex; align-items: center; color: var(--text-dim); }
  #credit a:hover { color: var(--accent); }

  /* ---- Chat: sidebar right column ---- */
  #chat-pane {
    flex: 0 0 35%;
    min-width: 360px;
    max-width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    position: relative;
  }
  #chat-messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-msg { max-width: 88%; }
  .chat-msg.user { align-self: flex-end; }
  .chat-msg .chat-msg-role {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .chat-msg .chat-msg-body {
    padding: 8px 11px;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.6;
    overflow-wrap: anywhere;
  }
  .chat-msg .chat-msg-body p { margin: 0 0 10px; }
  .chat-msg .chat-msg-body p:last-child { margin-bottom: 0; }
  .chat-msg .chat-msg-body code {
    font-family: var(--mono);
    background: rgba(127,127,127,0.18);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 12px;
  }
  .chat-msg .chat-msg-body pre {
    background: rgba(0,0,0,0.32);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .chat-msg .chat-msg-body pre code { background: none; padding: 0; font-size: 12px; }
  .chat-msg .chat-msg-body h1,.chat-msg .chat-msg-body h2,.chat-msg .chat-msg-body h3,
  .chat-msg .chat-msg-body h4 { margin: 14px 0 8px; line-height: 1.3; font-weight: 600; }
  .chat-msg .chat-msg-body h1 { font-size: 18px; }
  .chat-msg .chat-msg-body h2 { font-size: 16px; }
  .chat-msg .chat-msg-body h3 { font-size: 14px; }
  .chat-msg .chat-msg-body ul,.chat-msg .chat-msg-body ol { margin: 6px 0; padding-left: 20px; }
  .chat-msg.user .chat-msg-body {
    background: #1b170e;
    border: 1px solid rgba(224, 166, 58, 0.25);
    color: var(--text);
    white-space: pre-wrap;
  }

  /* ---- Typing Indicator ---- */
  .typing-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 12px;
    margin: 4px 0;
    width: fit-content;
  }
  .typing-dot {
    width: 6px;
    height: 6px;
    background-color: var(--text-dim);
    border-radius: 50%;
    display: inline-block;
    animation: typingBounce 1.4s infinite ease-in-out both;
  }
  .typing-dot:nth-child(1) { animation-delay: -0.32s; }
  .typing-dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes typingBounce {
    0%, 80%, 100% { transform: scale(0.3); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
  .chat-msg-tools { display: flex; flex-direction: column; gap: 3px; margin-bottom: 4px; }
  .chat-tool {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 8px;
    border-left: 3px solid var(--border);
    background: rgba(255, 255, 255, 0.02);
    border-radius: 0 4px 4px 0;
    line-height: 1.4;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s ease, border-left-color 0.15s ease, color 0.15s ease;
    margin: 2px 0;
  }
  .chat-tool:hover {
    background: rgba(255, 255, 255, 0.06);
  }
  .chat-tool.pending { color: var(--accent); border-left-color: var(--accent); }
  .chat-tool.done { color: var(--ok); border-left-color: var(--ok); }
  .chat-tool.error { color: var(--danger); border-left-color: var(--danger); }
  .chat-tool-output {
    display: none;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    margin: 2px 0 4px 8px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
  }
  .chat-tool-output.open { display: block; }
  .chat-msg-reasoning {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(127,127,127,0.08);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    user-select: none;
  }
  .chat-msg-reasoning summary { outline: none; }
  .chat-msg-reasoning .reasoning-body {
    margin-top: 4px;
    white-space: pre-wrap;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.8;
  }
  .chat-msg.assistant .chat-msg-body { background: var(--surface-2); border: 1px solid var(--border); }
  .chat-msg-actions {
    font-size: 12px;
    color: var(--text-dim);
    margin: 0 0 6px;
    padding-left: 18px;
  }
  .chat-msg-actions li { margin-bottom: 2px; }
  .chat-msg .chat-msg-body.error { border-color: var(--danger); color: var(--danger); }
  #chat-form {
    flex: 0 0 auto;
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  #chat-input {
    flex: 1 1 auto;
    resize: none;
    min-height: 38px;
    max-height: 140px;
    padding: 8px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    line-height: 1.4;
  }
  #chat-input:focus { outline: none; border-color: var(--accent); }
  #chat-input:disabled { opacity: 0.5; }
  #chat-send-btn {
    flex: 0 0 auto;
    padding: 0 18px;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: background 0.2s ease, opacity 0.2s ease, transform 0.1s ease, border-color 0.2s ease;
  }
  #chat-send-btn:hover:not(:disabled) {
    background: #f0b74b;
    transform: translateY(-1px);
  }
  #chat-send-btn:active:not(:disabled) {
    transform: translateY(0);
  }
  #chat-send-btn:disabled {
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    opacity: 0.5;
    cursor: not-allowed;
  }
  #chat-input:placeholder-shown ~ #chat-send-btn {
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }
  #chat-form-loading {
    display: none;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    width: 66px;
    border-radius: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    opacity: 0.8;
  }
  #chat-empty {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
  }

  /* ---- Resizable handle ---- */
  #resize-handle {
    flex: 0 0 6px;
    width: 6px;
    height: 100%;
    cursor: col-resize;
    background: transparent;
    border-left: 1px solid var(--border);
    z-index: 30;
    position: relative;
    transition: border-color 0.15s ease;
  }
  #resize-handle:hover, #resize-handle.active {
    border-left-color: var(--accent);
  }

  /* ---- Browse dialog ---- */
  #browse-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4, 6, 9, .6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.2s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.2s;
  }
  #browse-overlay.open {
    opacity: 1;
    pointer-events: auto;
    visibility: visible;
  }
  #browse-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 480px;
    max-width: 90vw;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    transform: scale(0.95) translateY(10px);
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #browse-overlay.open #browse-dialog {
    transform: scale(1) translateY(0);
  }
  #browse-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #browse-dir {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #browse-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .browse-entry {
    padding: 8px 14px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
  }
  .browse-entry:hover { background: var(--surface-2); }
  .browse-entry svg { flex: 0 0 auto; color: var(--text-dim); }
  .browse-entry.dir svg { color: var(--accent); }
  .browse-empty {
    padding: 14px;
    text-align: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
  }
  .browse-footer { padding: 10px 14px; border-top: 1px solid var(--border); text-align: right; }

  /* ---- Narrow viewports: without this, #chat-pane's 580px min-width
     forces real horizontal page overflow (confirmed at 375px — the page
     rendered at a virtual 980px layout width, the classic missing-
     viewport-meta symptom, compounded by the hard min-width on top of
     that). Stack the two panes instead of a side-by-side layout that
     simply doesn't fit — not a full mobile redesign, just a usable
     degraded state instead of forced pan/zoom. ---- */
  @media (max-width: 900px) {
    body { flex-direction: column; }
    #resize-handle { display: none !important; }
    #grc-pane { flex: 1 1 42%; min-height: 220px; }
    #chat-pane {
      flex: 1 1 58%;
      width: 100%;
      min-width: 0;
      max-width: none;
      border-left: none;
      border-top: 1px solid var(--border);
    }
  }
</style>
</head>
<body>
<main id="grc-pane">
  <div id="msg"></div>

  <div id="canvas-container">
    <iframe id="canvas-iframe" src=""></iframe>
    <div id="canvas-placeholder">
      <div class="placeholder-glow-container">
        <div class="placeholder-glow"></div>
        <svg class="placeholder-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>
        </svg>
      </div>
      <div class="placeholder-title">GRC Companion Workspace</div>
      <span id="canvas-placeholder-text">No flowgraph loaded. Click Browse to choose one.</span>
      <button id="browse-btn" aria-label="Browse Flowgraphs">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
        Browse Flowgraph&hellip;
      </button>
    </div>
  </div>

  <div id="file-block">
    <button id="undo-btn" title="Undo the last change" aria-label="Undo last change" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
    </button>
    <button id="redo-btn" title="Redo" aria-label="Redo change" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
    </button>
    <button id="validate-btn" title="Re-check the flowgraph's validity now" aria-label="Validate flowgraph">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.4 0 4.6.9 6.3 2.5M21 4v5h-5"/></svg>
      Validate
    </button>
    <span id="validation"></span>
    <span id="current-path">File: <span class="value">-</span></span>
  </div>

  <div id="credit">
    <span>Developed by Mahmoud Sallam</span>
    <a href="https://www.linkedin.com/in/mahmoudsallam7/" target="_blank" rel="noopener" title="LinkedIn" aria-label="LinkedIn Profile">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 1 1 0-4.124 2.062 2.062 0 0 1 0 4.124zM7.119 20.452H3.554V9h3.565v11.452z"/></svg>
    </a>
  </div>
</main>
<div id="resize-handle"></div>
<aside id="chat-pane" aria-label="Chat Companion">
  <div id="chat-toolbar">
    <div class="toolbar-group">
      <span id="provider-health" title="Provider connectivity status"></span>
      <span class="toolbar-label">Provider:</span>
      <select id="model-provider-select" title="Chat model provider">
        <option value="ollama">Ollama</option>
        <option value="ollama_cloud">Ollama Cloud</option>
        <option value="openrouter">OpenRouter</option>
      </select>
    </div>
    <div class="toolbar-group" style="flex: 1 1 auto; min-width: 0;">
      <span class="toolbar-label">Model:</span>
      <span id="model-name-label" tabindex="0" role="button" aria-haspopup="listbox" aria-expanded="false" title="Click to change the model name"></span>
      <input id="model-name-input" type="text" list="model-name-suggestions" placeholder="model name" style="display:none;" aria-label="Model name input">
      <datalist id="model-name-suggestions"></datalist>
      <button id="model-name-confirm-btn" title="Confirm" aria-label="Confirm model name" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
      </button>
      <button id="model-name-cancel-btn" title="Cancel" aria-label="Cancel model name" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <span id="model-restart-badge" title="A saved model change only takes effect after restarting the app.">restart to apply</span>
      <button id="apikey-btn" title="Set API key for this provider" aria-label="Configure API key" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      </button>
    </div>
    <span class="chat-toolbar-spacer" style="display: none;"></span>
    <div class="toolbar-group">
      <button id="clear-history-btn" title="Clear the chat history" aria-label="Clear chat history">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16z"/></svg>
      </button>
      <button id="new-conversation-btn" title="Start a new conversation / load a different file" aria-label="New conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button id="reset-conversation-btn" title="Chat looks stuck or blank? Click to reset." aria-label="Reset conversation">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
      </button>
    </div>
  </div>
  <div id="chat-messages" aria-live="polite">
    <div id="chat-empty">Load a flowgraph to start chatting.</div>
  </div>
  <form id="chat-form">
    <textarea id="chat-input" placeholder="Ask about your flowgraph…" rows="1" disabled></textarea>
    <button id="chat-send-btn" type="submit" aria-label="Send message" disabled>Send</button>
    <div id="chat-form-loading" aria-label="Processing message">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  </form>
  <div id="session-history-panel">
    <div id="session-history-header">Recent Sessions</div>
    <div id="session-history-list"></div>
  </div>
</aside>

<div id="apikey-dialog-overlay" role="dialog" aria-modal="true" aria-labelledby="apikey-dialog-header">
  <div id="apikey-dialog">
    <div id="apikey-dialog-header">Set API Key</div>
    <p id="apikey-dialog-desc">Enter your API key for <span id="apikey-provider-name"></span>:</p>
    <input id="apikey-input" type="password" placeholder="API key" aria-label="API key value">
    <div id="apikey-dialog-footer">
      <button id="apikey-cancel-btn" aria-label="Cancel API key edit">Cancel</button>
      <button id="apikey-save-btn" aria-label="Save API key">Save</button>
    </div>
  </div>
</div>

<div id="browse-overlay" role="dialog" aria-modal="true" aria-labelledby="browse-dir">
  <div id="browse-dialog">
    <div id="browse-header">
      <button id="browse-up-btn" class="secondary" aria-label="Navigate up one directory">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        Up
      </button>
      <span id="browse-dir">-</span>
    </div>
    <div id="browse-list"></div>
    <div class="browse-footer"><button id="browse-cancel-btn" aria-label="Cancel file browser">Cancel</button></div>
  </div>
</div>

<script src="/grc/panel.js"></script>
</body>
</html>
