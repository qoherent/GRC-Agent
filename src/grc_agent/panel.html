<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qoherent GRC Agent</title>
<style>
  :root {
    --bg: #0b0f14;
    --surface: #141a21;
    --surface-2: #1c232c;
    --border: #262f39;
    --text: #e4e7ea;
    --text-dim: #8b96a3;
    --accent: #e0a63a;
    --accent-dim: #7a5a26;
    --ok: #3ddc84;
    --ok-bg: #123420;
    --danger: #ff6b6b;
    --danger-bg: #3a1418;
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
  }
  a { color: var(--accent); }
  button:focus-visible, input:focus-visible, a:focus-visible,
  select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  /* ---- Center panel: GRC Broadway interactive canvas ---- */
  #grc-pane {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  #file-block {
    flex: 0 0 auto;
    padding: 14px 16px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #undo-btn, #redo-btn { padding: 7px 9px; }
  #current-path {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    word-break: break-all;
    min-width: 0;
  }
  #current-path .value { color: var(--text); }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 9px;
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .pill.valid { background: var(--ok-bg); color: var(--ok); }
  .pill.invalid { background: var(--danger-bg); color: var(--danger); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent-dim); }
  button svg { flex: 0 0 auto; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button:disabled:hover { border-color: var(--border); }

  #msg {
    flex: 0 0 auto;
    font-family: var(--mono);
    font-size: 11px;
    padding: 0 16px;
    height: 0;
    overflow: hidden;
    transition: height 120ms ease;
  }
  #msg.visible { height: 28px; padding-top: 6px; }
  #msg.error { color: var(--danger); }
  #msg.ok { color: var(--ok); }

  /* ---- History overlay (over the chat widget's own left sidebar) ---- */
  #left-sidebar-overlay {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 10;
    display: none;
    flex-direction: column;
  }
  #history-block {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }
  #history-block button {
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--danger);
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
  }
  #history-block button:hover { border-color: var(--danger-bg); background: var(--danger-bg); }
  #history-block button svg { flex: 0 0 auto; }

  /* ---- Model provider/name picker, overlaid on the chat's own (inert)
     model dropdown so it sits directly in the chat toolbar. The model NAME
     is read-only text (#model-name-label) until clicked — swapping in an
     always-editable input risked an accidental keystroke/blur silently
     saving a change the user didn't mean to make. Clicking swaps in
     #model-name-input plus explicit confirm/cancel buttons; nothing saves
     until confirm is clicked (or Enter pressed) — see integrateModelSelector
     in panel.js. ---- */
  #model-selector-overlay {
    position: fixed;
    display: none;
    align-items: center;
    gap: 6px;
    z-index: 20;
  }
  #model-selector-overlay select,
  #model-selector-overlay input {
    height: 28px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 6px;
  }
  #model-selector-overlay select { flex: 0 0 auto; max-width: 84px; }
  #model-selector-overlay input { flex: 1 1 auto; min-width: 220px; }
  #model-name-label {
    flex: 1 1 auto;
    min-width: 140px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #model-name-label:hover { background: var(--surface-2); border-color: var(--border); }
  #model-name-confirm-btn, #model-name-cancel-btn {
    flex: 0 0 auto;
    width: 28px;
    height: 28px;
    padding: 0;
  }
  #model-name-confirm-btn { color: var(--ok); border-color: var(--ok); }
  #model-name-confirm-btn:hover { background: var(--ok-bg); }
  #model-name-cancel-btn:hover { border-color: var(--danger); color: var(--danger); }
  #model-selector-overlay.error #model-name-input { border-color: var(--danger); }
  /* Persistent (no timeout) — unlike the transient .saved/.error flash,
     this stays up as long as the running Agent's active model differs from
     what's saved to disk, since a saved change never takes effect without
     an app restart (see AGENTS.md). integrateModelSelector re-derives this
     from /grc/settings' active_provider/active_model vs provider/model on
     every poll, so it's correct even right after a page reload — not a
     one-shot flag that only shows up immediately after clicking confirm. */
  #model-restart-badge {
    display: none;
    flex: 0 0 auto;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 100px;
    background: var(--accent-dim);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
    cursor: help;
  }
  #model-restart-badge.visible { display: inline-flex; }

  /* ---- Provider health indicator ---- */
  #provider-health {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    cursor: help;
  }
  #provider-health.healthy { background: var(--ok-bg); color: var(--ok); }
  #provider-health.unhealthy { background: var(--danger-bg); color: var(--danger); }
  #provider-health.checking { background: var(--surface-2); color: var(--text-dim); }
  #provider-health::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex: 0 0 auto;
  }

  /* ---- API key button ---- */
  #apikey-btn {
    flex: 0 0 auto;
    width: 28px;
    height: 28px;
    padding: 0;
    border-radius: 6px;
    color: var(--text-dim);
  }
  #apikey-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  /* ---- API key dialog ---- */
  #apikey-dialog-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4, 6, 9, .6);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #apikey-dialog-overlay.open { display: flex; }
  #apikey-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 400px;
    max-width: 90vw;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  #apikey-dialog-header {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  #apikey-dialog-desc {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  #apikey-dialog-desc span { color: var(--accent); font-weight: 600; }
  #apikey-input {
    width: 100%;
    height: 36px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    padding: 4px 10px;
    margin-bottom: 16px;
  }
  #apikey-dialog-footer { display: flex; justify-content: flex-end; gap: 8px; }
  #apikey-save-btn { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  #apikey-save-btn:hover { background: var(--accent); color: var(--bg); }

  /* ---- New-conversation button, overlaid just left of the chat's send
     button ---- */
  #new-conversation-btn {
    position: fixed;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0;
    border-radius: 50%;
    z-index: 20;
  }
  #new-conversation-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ---- Session history list, shown above the chat input until a
     conversation is active ---- */
  #session-history-panel {
    position: absolute;
    left: 0;
    right: 0;
    display: none;
    max-height: 45%;
    overflow-y: auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 6;
  }
  #session-history-header {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 8px 16px 4px;
  }
  .session-history-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    border-top: 1px solid var(--border);
  }
  .session-history-entry:hover { background: var(--surface-2); }
  .she-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .she-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    flex: 0 0 auto;
  }

  /* ---- Credit ---- */
  #credit {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    padding: 10px 16px;
    border-top: 1px solid var(--border);
  }
  #credit a { display: inline-flex; align-items: center; color: var(--text-dim); }
  #credit a:hover { color: var(--accent); }

  /* ---- Chat: sidebar right column ---- */
  #chat-pane {
    flex: 0 1 680px;
    min-width: 580px;
    max-width: 720px;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-left: 1px solid var(--border);
    position: relative;
  }
  #chat-pane iframe { flex: 1; min-height: 0; width: 100%; border: 0; }

  /* ---- Always-available escape hatch: unlike every other chat-pane
     control, this one does NOT depend on finding anything inside the
     iframe's own DOM, so it still works even when the chat widget itself
     is broken (e.g. a stale/garbage conversation id) and every overlay
     that DOES depend on iframe introspection has hidden itself. ---- */
  #reset-conversation-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    padding: 0;
    border-radius: 6px;
    opacity: .5;
    z-index: 30;
  }
  #reset-conversation-btn:hover { opacity: 1; }

  /* ---- Browse dialog ---- */
  #browse-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4, 6, 9, .6);
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #browse-overlay.open { display: flex; }
  #browse-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 480px;
    max-width: 90vw;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  #browse-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #browse-dir {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #browse-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .browse-entry {
    padding: 8px 14px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
  }
  .browse-entry:hover { background: var(--surface-2); }
  .browse-entry svg { flex: 0 0 auto; color: var(--text-dim); }
  .browse-entry.dir svg { color: var(--accent); }
  .browse-empty {
    padding: 14px;
    text-align: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
  }
  .browse-footer { padding: 10px 14px; border-top: 1px solid var(--border); text-align: right; }

  /* ---- Narrow viewports: without this, #chat-pane's 580px min-width
     forces real horizontal page overflow (confirmed at 375px — the page
     rendered at a virtual 980px layout width, the classic missing-
     viewport-meta symptom, compounded by the hard min-width on top of
     that). Stack the two panes instead of a side-by-side layout that
     simply doesn't fit — not a full mobile redesign, just a usable
     degraded state instead of forced pan/zoom. ---- */
  @media (max-width: 900px) {
    body { flex-direction: column; }
    #grc-pane { flex: 1 1 42%; min-height: 220px; }
    #chat-pane {
      flex: 1 1 58%;
      width: 100%;
      min-width: 0;
      max-width: none;
      border-left: none;
      border-top: 1px solid var(--border);
    }
  }
</style>
</head>
<body>
<div id="grc-pane">
  <div id="msg"></div>

  <div id="canvas-container" style="flex: 1; min-height: 0; width: 100%; border: 0; position: relative; background: #fff;">
    <iframe id="canvas-iframe" src="" style="width: 100%; height: 100%; border: 0; display: none;"></iframe>
    <div id="canvas-placeholder" style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-dim); font-family: var(--mono); font-size: 13px; text-align: center; padding: 20px;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 12px; color: var(--accent);"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      <span id="canvas-placeholder-text">No flowgraph loaded. Click Browse to choose one.</span>
      <button id="browse-btn" style="margin-top: 14px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
        Browse&hellip;
      </button>
    </div>
  </div>

  <div id="file-block">
    <button id="undo-btn" title="Undo the last change" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
    </button>
    <button id="redo-btn" title="Redo" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
    </button>
    <button id="validate-btn" title="Re-check the flowgraph's validity now">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.4 0 4.6.9 6.3 2.5M21 4v5h-5"/></svg>
      Validate
    </button>
    <span id="validation"></span>
    <span id="current-path">File: <span class="value">-</span></span>
  </div>

  <div id="credit">
    <span>Developed by Mahmoud Sallam</span>
    <a href="https://www.linkedin.com/in/mahmoudsallam7/" target="_blank" rel="noopener" title="LinkedIn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 1 1 0-4.124 2.062 2.062 0 0 1 0 4.124zM7.119 20.452H3.554V9h3.565v11.452z"/></svg>
    </a>
  </div>
</div>

<div id="chat-pane">
  <button id="reset-conversation-btn" title="Chat looks stuck or blank? Click to reset.">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
  </button>
  <iframe id="chat-frame" title="Chat"></iframe>
  <div id="left-sidebar-overlay">
    <div id="history-block">
      <button id="clear-history-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16z"/></svg>
        Clear History
      </button>
    </div>
  </div>
  <div id="session-history-panel">
    <div id="session-history-header">Recent Sessions</div>
    <div id="session-history-list"></div>
  </div>
</div>

<div id="model-selector-overlay">
  <select id="model-provider-select" title="Chat model provider">
    <option value="ollama">Ollama</option>
    <option value="ollama_cloud">Ollama Cloud</option>
    <option value="openrouter">OpenRouter</option>
  </select>
  <span id="model-name-label" tabindex="0" role="button" title="Click to change the model name"></span>
  <input id="model-name-input" type="text" list="model-name-suggestions" placeholder="model name" style="display:none;">
  <datalist id="model-name-suggestions"></datalist>
  <button id="model-name-confirm-btn" title="Confirm" style="display:none;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
  </button>
  <button id="model-name-cancel-btn" title="Cancel" style="display:none;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
  <span id="model-restart-badge" title="A saved model change only takes effect after restarting the app.">restart to apply</span>
  <span id="provider-health" title="Provider connectivity status"></span>
  <button id="apikey-btn" title="Set API key for this provider" style="display:none;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
  </button>
</div>

<div id="apikey-dialog-overlay">
  <div id="apikey-dialog">
    <div id="apikey-dialog-header">Set API Key</div>
    <p id="apikey-dialog-desc">Enter your API key for <span id="apikey-provider-name"></span>:</p>
    <input id="apikey-input" type="password" placeholder="API key">
    <div id="apikey-dialog-footer">
      <button id="apikey-cancel-btn">Cancel</button>
      <button id="apikey-save-btn">Save</button>
    </div>
  </div>
</div>

<button id="new-conversation-btn" title="Start a new conversation / load a different file">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div id="browse-overlay">
  <div id="browse-dialog">
    <div id="browse-header">
      <button id="browse-up-btn" class="secondary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        Up
      </button>
      <span id="browse-dir">-</span>
    </div>
    <div id="browse-list"></div>
    <div class="browse-footer"><button id="browse-cancel-btn">Cancel</button></div>
  </div>
</div>

<script src="/grc/panel.js"></script>
</body>
</html>
